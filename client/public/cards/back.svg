<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 112">
  <!-- Card base -->
  <rect width="80" height="112" rx="8" fill="#12122a"/>
  <!-- Outer border -->
  <rect x="3" y="3" width="74" height="106" rx="6" fill="none" stroke="#3535a0" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="7" y="7" width="66" height="98" rx="4" fill="none" stroke="#2a2a7a" stroke-width="1"/>
  <!-- Background diagonal pattern -->
  <defs>
    <pattern id="diag" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a44" stroke-width="2.5"/>
    </pattern>
    <clipPath id="inner"><rect x="7" y="7" width="66" height="98" rx="4"/></clipPath>
  </defs>
  <rect x="7" y="7" width="66" height="98" rx="4" fill="url(#diag)"/>
  <!-- Outer diamond -->
  <polygon points="40,26 62,56 40,86 18,56" fill="none" stroke="#4545c0" stroke-width="1.5" clip-path="url(#inner)"/>
  <!-- Mid diamond -->
  <polygon points="40,38 54,56 40,74 26,56" fill="#111140" stroke="#5555d0" stroke-width="1" clip-path="url(#inner)"/>
  <!-- Inner diamond -->
  <polygon points="40,47 48,56 40,65 32,56" fill="#2222aa" stroke="#7070e8" stroke-width="1"/>
  <!-- Center gem -->
  <circle cx="40" cy="56" r="5" fill="#5555ff" opacity="0.9"/>
  <circle cx="40" cy="56" r="2.5" fill="#c0c0ff"/>
  <!-- Corner ornaments -->
  <polygon points="15,13 20,20 15,27 10,20" fill="none" stroke="#4545b0" stroke-width="1" opacity="0.8"/>
  <polygon points="65,13 70,20 65,27 60,20" fill="none" stroke="#4545b0" stroke-width="1" opacity="0.8"/>
  <polygon points="15,85 20,92 15,99 10,92" fill="none" stroke="#4545b0" stroke-width="1" opacity="0.8"/>
  <polygon points="65,85 70,92 65,99 60,92" fill="none" stroke="#4545b0" stroke-width="1" opacity="0.8"/>
</svg>
