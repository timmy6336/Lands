<svg xmlns="http://www.w3.org/2000/svg" width="200" height="130" viewBox="0 0 200 130">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a1018"/><stop offset="100%" stop-color="#060c14"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#2060a0" stop-opacity="0.35"/><stop offset="100%" stop-color="#060c14" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="200" height="130" fill="url(#bg)" rx="8"/>
<ellipse cx="100" cy="65" rx="85" ry="55" fill="url(#glow)"/>
<!-- mini cards representing each land type -->
<rect x="18" y="18" width="28" height="40" rx="4" fill="#f8e8b0"/>
<linearGradient xmlns="http://www.w3.org/2000/svg" id="plains" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#e8d880"/><stop offset="100%" stop-color="#c8a830"/>
</linearGradient>
<rect x="18" y="18" width="28" height="40" rx="4" fill="url(#plains)"/>
<rect x="18" y="18" width="28" height="40" rx="4" fill="none" stroke="#e8d880" stroke-width="1.2"/>

<rect x="52" y="18" width="28" height="40" rx="4"/>
<linearGradient xmlns="http://www.w3.org/2000/svg" id="mount" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#3a1000"/><stop offset="100%" stop-color="#c04010"/>
</linearGradient>
<rect x="52" y="18" width="28" height="40" rx="4" fill="url(#mount)"/>
<rect x="52" y="18" width="28" height="40" rx="4" fill="none" stroke="#e05818" stroke-width="1.2"/>

<rect x="86" y="18" width="28" height="40" rx="4"/>
<linearGradient xmlns="http://www.w3.org/2000/svg" id="isle" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#0a2240"/><stop offset="100%" stop-color="#204880"/>
</linearGradient>
<rect x="86" y="18" width="28" height="40" rx="4" fill="url(#isle)"/>
<rect x="86" y="18" width="28" height="40" rx="4" fill="none" stroke="#4888d0" stroke-width="1.2"/>

<rect x="120" y="18" width="28" height="40" rx="4"/>
<linearGradient xmlns="http://www.w3.org/2000/svg" id="forst" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#0a1a08"/><stop offset="100%" stop-color="#104818"/>
</linearGradient>
<rect x="120" y="18" width="28" height="40" rx="4" fill="url(#forst)"/>
<rect x="120" y="18" width="28" height="40" rx="4" fill="none" stroke="#30a840" stroke-width="1.2"/>

<rect x="154" y="18" width="28" height="40" rx="4"/>
<linearGradient xmlns="http://www.w3.org/2000/svg" id="swmp" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#040408"/><stop offset="100%" stop-color="#100820"/>
</linearGradient>
<rect x="154" y="18" width="28" height="40" rx="4" fill="url(#swmp)"/>
<rect x="154" y="18" width="28" height="40" rx="4" fill="none" stroke="#4820a0" stroke-width="1.2"/>

<!-- terrain symbol per card -->
<!-- sun for plains -->
<circle cx="32" cy="30" r="5" fill="#f8e060" opacity="0.85"/>
<!-- volcano peak for mountain -->
<polygon points="66,24 72,38 60,38" fill="#cc3000" opacity="0.8"/>
<!-- moon for island -->
<circle cx="100" cy="30" r="5" fill="#90c8f8" opacity="0.85"/>
<circle cx="103" cy="28" r="4" fill="url(#isle)" opacity="0.7"/>
<!-- tree for forest -->
<polygon points="134,25 140,38 128,38" fill="#30a040" opacity="0.8"/>
<!-- crescent for swamp -->
<circle cx="168" cy="30" r="5" fill="#6030c0" opacity="0.85"/>
<circle cx="171" cy="28" r="4" fill="url(#swmp)" opacity="0.7"/>

<text x="100" y="92" font-size="12" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" fill="#c8d8f0" letter-spacing="3">CLASSIC</text>
<text x="100" y="110" font-size="7.5" font-family="Georgia,serif" text-anchor="middle" fill="#506080" letter-spacing="1.5">DEFAULT TERRAIN ART</text>
</svg>
