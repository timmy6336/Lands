<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a1018"/><stop offset="100%" stop-color="#060c14"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#2060a0" stop-opacity="0.35"/><stop offset="100%" stop-color="#060c14" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="plains" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8d880"/><stop offset="100%" stop-color="#c8a830"/>
  </linearGradient>
  <linearGradient id="mount" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a1000"/><stop offset="100%" stop-color="#c04010"/>
  </linearGradient>
  <linearGradient id="isle" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a2240"/><stop offset="100%" stop-color="#204880"/>
  </linearGradient>
  <linearGradient id="forst" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a1a08"/><stop offset="100%" stop-color="#104818"/>
  </linearGradient>
  <linearGradient id="swmp" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#040408"/><stop offset="100%" stop-color="#100820"/>
  </linearGradient>
  <linearGradient id="back" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1820"/><stop offset="100%" stop-color="#060e16"/>
  </linearGradient>
</defs>
<rect width="400" height="110" fill="url(#bg)" rx="8"/>
<ellipse cx="200" cy="50" rx="180" ry="55" fill="url(#glow)"/>
<!-- white card -->
<rect x="61" y="12" width="38" height="57" rx="4" fill="url(#plains)"/>
<rect x="61" y="12" width="38" height="57" rx="4" fill="none" stroke="#e8d880" stroke-width="1.2"/>
<circle cx="80" cy="28" r="6" fill="#f8e060" opacity="0.85"/>
<!-- red card -->
<rect x="109" y="12" width="38" height="57" rx="4" fill="url(#mount)"/>
<rect x="109" y="12" width="38" height="57" rx="4" fill="none" stroke="#e05818" stroke-width="1.2"/>
<polygon points="128,20 135,38 121,38" fill="#cc3000" opacity="0.8"/>
<!-- blue card -->
<rect x="157" y="12" width="38" height="57" rx="4" fill="url(#isle)"/>
<rect x="157" y="12" width="38" height="57" rx="4" fill="none" stroke="#4888d0" stroke-width="1.2"/>
<circle cx="176" cy="28" r="6" fill="#90c8f8" opacity="0.85"/>
<circle cx="180" cy="25" r="5" fill="#0a2240" opacity="0.8"/>
<!-- green card -->
<rect x="205" y="12" width="38" height="57" rx="4" fill="url(#forst)"/>
<rect x="205" y="12" width="38" height="57" rx="4" fill="none" stroke="#30a840" stroke-width="1.2"/>
<polygon points="224,20 231,38 217,38" fill="#30a040" opacity="0.8"/>
<!-- black card -->
<rect x="253" y="12" width="38" height="57" rx="4" fill="url(#swmp)"/>
<rect x="253" y="12" width="38" height="57" rx="4" fill="none" stroke="#4820a0" stroke-width="1.2"/>
<circle cx="272" cy="28" r="6" fill="#6030c0" opacity="0.85"/>
<circle cx="276" cy="25" r="5" fill="#040408" opacity="0.8"/>
<!-- back card -->
<rect x="301" y="12" width="38" height="57" rx="4" fill="url(#back)"/>
<rect x="301" y="12" width="38" height="57" rx="4" fill="none" stroke="#405070" stroke-width="1.2"/>
<rect x="306" y="17" width="28" height="47" rx="2" fill="none" stroke="#304060" stroke-width="0.8"/>
<text x="320" y="46" font-size="9" font-family="Georgia,serif" text-anchor="middle" fill="#405070">✦</text>
<!-- labels -->
<text x="200" y="84" font-size="12" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" fill="#8090b0" letter-spacing="3">CLASSIC</text>
<text x="200" y="99" font-size="7" font-family="Georgia,serif" text-anchor="middle" fill="#405070" letter-spacing="1.5">ORIGINAL LANDS CARD ART</text>
</svg>
