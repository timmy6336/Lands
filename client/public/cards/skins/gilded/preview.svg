  <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8c060" stop-opacity="0.15"/><stop offset="100%" stop-color="#e8c060" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="400" height="110" fill="url(#bg)"/>
<ellipse cx="200" cy="50" rx="180" ry="55" fill="url(#glow)"/>
<rect width="400" height="50" fill="url(#shine)"/>
