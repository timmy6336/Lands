<svg xmlns="http://www.w3.org/2000/svg" width="200" height="280" viewBox="0 0 200 280">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020008"/><stop offset="50%" stop-color="#040010"/><stop offset="100%" stop-color="#020008"/>
  </linearGradient>
  <radialGradient id="cg" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#6000c0" stop-opacity="0.35"/><stop offset="100%" stop-color="#020008" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="v" cx="50%" cy="50%" r="68%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <linearGradient id="fr" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8000ff"/><stop offset="100%" stop-color="#3000808"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="200" height="280" fill="url(#bg)" rx="10"/>
<ellipse cx="100" cy="140" rx="75" ry="75" fill="url(#cg)"/>
<!-- circuit traces -->
<g stroke="#6000c0" stroke-width="1" fill="none" stroke-opacity="0.5">
  <!-- horizontal routes -->
  <polyline points="18,50 60,50 60,80 140,80 140,50 182,50"/>
  <polyline points="18,230 60,230 60,200 140,200 140,230 182,230"/>
  <polyline points="18,140 44,140 44,110 80,110 80,140 120,140 120,110 156,110 156,140 182,140"/>
  <!-- vertical routes -->
  <polyline points="50,18 50,44 80,44 80,18"/>
  <polyline points="120,18 120,44 150,44 150,18"/>
  <polyline points="50,262 50,236 80,236 80,262"/>
  <polyline points="120,262 120,236 150,236 150,262"/>
</g>
<!-- nodes / vias -->
<g fill="#8000ff" opacity="0.7">
  <circle cx="60" cy="80" r="3"/><circle cx="140" cy="80" r="3"/><circle cx="60" cy="200" r="3"/>
  <circle cx="140" cy="200" r="3"/><circle cx="80" cy="110" r="3"/><circle cx="120" cy="110" r="3"/>
  <circle cx="44" cy="140" r="3"/><circle cx="156" cy="140" r="3"/>
</g>
<!-- central chip -->
<rect x="74" y="114" width="52" height="52" rx="4" fill="#060018" stroke="#8000ff" stroke-width="1.2" stroke-opacity="0.8" filter="url(#glow)"/>
<rect x="80" y="120" width="40" height="40" rx="3" fill="none" stroke="#a040ff" stroke-width="0.7" stroke-opacity="0.5"/>
<!-- chip pin lines -->
<g stroke="#6000c0" stroke-width="1.5" stroke-opacity="0.5">
  <line x1="74" y1="126" x2="60" y2="126"/><line x1="74" y1="134" x2="60" y2="134"/>
  <line x1="74" y1="142" x2="60" y2="142"/><line x1="74" y1="150" x2="60" y2="150"/>
  <line x1="74" y1="158" x2="60" y2="158"/>
  <line x1="126" y1="126" x2="140" y2="126"/><line x1="126" y1="134" x2="140" y2="134"/>
  <line x1="126" y1="142" x2="140" y2="142"/><line x1="126" y1="150" x2="140" y2="150"/>
  <line x1="126" y1="158" x2="140" y2="158"/>
</g>
<circle cx="100" cy="140" r="10" fill="#060018" stroke="#a040ff" stroke-width="1" filter="url(#glow)"/>
<circle cx="100" cy="140" r="4" fill="#8000ff" opacity="0.7"/>
<!-- scan lines -->
<g opacity="0.06"><line x1="0" y1="0" x2="200" y2="0" stroke="white" stroke-width="0.5"/><line x1="0" y1="8" x2="200" y2="8" stroke="white" stroke-width="0.5"/><line x1="0" y1="16" x2="200" y2="16" stroke="white" stroke-width="0.5"/><line x1="0" y1="24" x2="200" y2="24" stroke="white" stroke-width="0.5"/><line x1="0" y1="32" x2="200" y2="32" stroke="white" stroke-width="0.5"/><line x1="0" y1="40" x2="200" y2="40" stroke="white" stroke-width="0.5"/><line x1="0" y1="48" x2="200" y2="48" stroke="white" stroke-width="0.5"/><line x1="0" y1="56" x2="200" y2="56" stroke="white" stroke-width="0.5"/><line x1="0" y1="64" x2="200" y2="64" stroke="white" stroke-width="0.5"/><line x1="0" y1="72" x2="200" y2="72" stroke="white" stroke-width="0.5"/><line x1="0" y1="80" x2="200" y2="80" stroke="white" stroke-width="0.5"/><line x1="0" y1="88" x2="200" y2="88" stroke="white" stroke-width="0.5"/><line x1="0" y1="96" x2="200" y2="96" stroke="white" stroke-width="0.5"/><line x1="0" y1="104" x2="200" y2="104" stroke="white" stroke-width="0.5"/><line x1="0" y1="112" x2="200" y2="112" stroke="white" stroke-width="0.5"/><line x1="0" y1="120" x2="200" y2="120" stroke="white" stroke-width="0.5"/><line x1="0" y1="128" x2="200" y2="128" stroke="white" stroke-width="0.5"/><line x1="0" y1="136" x2="200" y2="136" stroke="white" stroke-width="0.5"/><line x1="0" y1="144" x2="200" y2="144" stroke="white" stroke-width="0.5"/><line x1="0" y1="152" x2="200" y2="152" stroke="white" stroke-width="0.5"/><line x1="0" y1="160" x2="200" y2="160" stroke="white" stroke-width="0.5"/><line x1="0" y1="168" x2="200" y2="168" stroke="white" stroke-width="0.5"/><line x1="0" y1="176" x2="200" y2="176" stroke="white" stroke-width="0.5"/><line x1="0" y1="184" x2="200" y2="184" stroke="white" stroke-width="0.5"/><line x1="0" y1="192" x2="200" y2="192" stroke="white" stroke-width="0.5"/><line x1="0" y1="200" x2="200" y2="200" stroke="white" stroke-width="0.5"/><line x1="0" y1="208" x2="200" y2="208" stroke="white" stroke-width="0.5"/><line x1="0" y1="216" x2="200" y2="216" stroke="white" stroke-width="0.5"/><line x1="0" y1="224" x2="200" y2="224" stroke="white" stroke-width="0.5"/><line x1="0" y1="232" x2="200" y2="232" stroke="white" stroke-width="0.5"/><line x1="0" y1="240" x2="200" y2="240" stroke="white" stroke-width="0.5"/><line x1="0" y1="248" x2="200" y2="248" stroke="white" stroke-width="0.5"/><line x1="0" y1="256" x2="200" y2="256" stroke="white" stroke-width="0.5"/><line x1="0" y1="264" x2="200" y2="264" stroke="white" stroke-width="0.5"/><line x1="0" y1="272" x2="200" y2="272" stroke="white" stroke-width="0.5"/></g>
<rect width="200" height="280" fill="url(#v)" rx="10"/>
<rect x="5" y="5" width="190" height="270" rx="8" fill="none" stroke="url(#fr)" stroke-width="2" filter="url(#glow)"/>
<rect x="5" y="5" width="190" height="270" rx="8" fill="none" stroke="#8000ff" stroke-width="0.6" stroke-opacity="0.8"/>
</svg>