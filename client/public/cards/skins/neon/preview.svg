<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020008"/><stop offset="100%" stop-color="#040012"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="110" fill="url(#bg)"/>
<!-- grid lines -->
<g stroke="#8000ff" stroke-width="0.5" stroke-opacity="0.2">
  <line x1="0" y1="22" x2="400" y2="22"/><line x1="0" y1="44" x2="400" y2="44"/>
  <line x1="0" y1="66" x2="400" y2="66"/><line x1="0" y1="88" x2="400" y2="88"/>
  <line x1="50" y1="0" x2="50" y2="110"/><line x1="100" y1="0" x2="100" y2="110"/>
  <line x1="150" y1="0" x2="150" y2="110"/><line x1="200" y1="0" x2="200" y2="110"/>
  <line x1="250" y1="0" x2="250" y2="110"/><line x1="300" y1="0" x2="300" y2="110"/>
  <line x1="350" y1="0" x2="350" y2="110"/>
</g>
<!-- scan lines -->
<g opacity="0.06">
  <rect x="0" y="0" width="400" height="2" fill="white"/><rect x="0" y="6" width="400" height="2" fill="white"/>
  <rect x="0" y="12" width="400" height="2" fill="white"/><rect x="0" y="18" width="400" height="2" fill="white"/>
  <rect x="0" y="24" width="400" height="2" fill="white"/><rect x="0" y="30" width="400" height="2" fill="white"/>
  <rect x="0" y="36" width="400" height="2" fill="white"/><rect x="0" y="42" width="400" height="2" fill="white"/>
  <rect x="0" y="48" width="400" height="2" fill="white"/><rect x="0" y="54" width="400" height="2" fill="white"/>
  <rect x="0" y="60" width="400" height="2" fill="white"/><rect x="0" y="66" width="400" height="2" fill="white"/>
  <rect x="0" y="72" width="400" height="2" fill="white"/><rect x="0" y="78" width="400" height="2" fill="white"/>
  <rect x="0" y="84" width="400" height="2" fill="white"/><rect x="0" y="90" width="400" height="2" fill="white"/>
  <rect x="0" y="96" width="400" height="2" fill="white"/><rect x="0" y="102" width="400" height="2" fill="white"/>
  <rect x="0" y="108" width="400" height="2" fill="white"/>
</g>
<!-- white -->
<rect x="61" y="12" width="38" height="57" rx="3" fill="#06001a"/>
<rect x="61" y="12" width="38" height="57" rx="3" fill="none" stroke="#00f0e0" stroke-width="1.6" filter="url(#glow)"/>
<circle cx="80" cy="34" r="7" fill="#00f0e0" opacity="0.6" filter="url(#glow)"/>
<line x1="70" y1="50" x2="90" y2="50" stroke="#00f0e0" stroke-width="0.8" opacity="0.4"/>
<line x1="70" y1="54" x2="90" y2="54" stroke="#00f0e0" stroke-width="0.8" opacity="0.25"/>
<!-- red -->
<rect x="109" y="12" width="38" height="57" rx="3" fill="#12000a"/>
<rect x="109" y="12" width="38" height="57" rx="3" fill="none" stroke="#ff0060" stroke-width="1.6" filter="url(#glow)"/>
<circle cx="128" cy="34" r="7" fill="#ff0060" opacity="0.6" filter="url(#glow)"/>
<line x1="118" y1="50" x2="138" y2="50" stroke="#ff0060" stroke-width="0.8" opacity="0.4"/>
<line x1="118" y1="54" x2="138" y2="54" stroke="#ff0060" stroke-width="0.8" opacity="0.25"/>
