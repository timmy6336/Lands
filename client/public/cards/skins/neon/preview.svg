<rect x="157" y="12" width="38" height="57" rx="3" fill="#00040e"/>
<rect x="157" y="12" width="38" height="57" rx="3" fill="none" stroke="#0080ff" stroke-width="1.6" filter="url(#glow)"/>
<circle cx="176" cy="34" r="7" fill="#0080ff" opacity="0.6" filter="url(#glow)"/>
<line x1="166" y1="50" x2="186" y2="50" stroke="#0080ff" stroke-width="0.8" opacity="0.4"/>
<line x1="166" y1="54" x2="186" y2="54" stroke="#0080ff" stroke-width="0.8" opacity="0.25"/>
<!-- green -->
<rect x="205" y="12" width="38" height="57" rx="3" fill="#00060a"/>
<rect x="205" y="12" width="38" height="57" rx="3" fill="none" stroke="#00ff60" stroke-width="1.6" filter="url(#glow)"/>
<circle cx="224" cy="34" r="7" fill="#00ff60" opacity="0.6" filter="url(#glow)"/>
<line x1="214" y1="50" x2="234" y2="50" stroke="#00ff60" stroke-width="0.8" opacity="0.4"/>
<line x1="214" y1="54" x2="234" y2="54" stroke="#00ff60" stroke-width="0.8" opacity="0.25"/>
<!-- black -->
<rect x="253" y="12" width="38" height="57" rx="3" fill="#040008"/>
<rect x="253" y="12" width="38" height="57" rx="3" fill="none" stroke="#b000ff" stroke-width="1.6" filter="url(#glow)"/>
<circle cx="272" cy="34" r="7" fill="#b000ff" opacity="0.6" filter="url(#glow)"/>
<line x1="262" y1="50" x2="282" y2="50" stroke="#b000ff" stroke-width="0.8" opacity="0.4"/>
<line x1="262" y1="54" x2="282" y2="54" stroke="#b000ff" stroke-width="0.8" opacity="0.25"/>
<!-- back -->
<rect x="301" y="12" width="38" height="57" rx="3" fill="#06000e"/>
<rect x="301" y="12" width="38" height="57" rx="3" fill="none" stroke="#ff80ff" stroke-width="1.6" filter="url(#glow)"/>
<rect x="309" y="20" width="22" height="33" rx="2" fill="none" stroke="#ff80ff" stroke-width="0.8" opacity="0.45" filter="url(#glow)"/>
<circle cx="320" cy="36" r="5" fill="#ff80ff" opacity="0.45" filter="url(#glow)"/>
<!-- text -->
<text x="200" y="84" font-size="15" font-family="'Courier New',monospace" font-weight="bold" text-anchor="middle" fill="#b000ff" letter-spacing="5" filter="url(#glow)">NEON</text>
<text x="200" y="99" font-size="7.5" font-family="'Courier New',monospace" text-anchor="middle" fill="#6000c0" letter-spacing="2">SYNTHWAVE LANDS</text>
</svg>